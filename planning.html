<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#3d2b1f">
  <meta name="apple-mobile-web-app-title" content="Repas">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <link rel="manifest" href="manifest.json">
  <title>Repas — Planning</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <nav class="nav">
    <a href="index.html" class="nav-logo">🍽️ Repas</a>
    <button class="nav-burger" id="navBurger" aria-label="Menu">☰</button>
    <div class="nav-links" id="navLinks">
      <a href="planning.html" class="active">📅 Planning</a>
      <a href="recettes.html">📖 Recettes</a>
      <a href="preferences.html">❤️ Préférences</a>
      <a href="courses.html">🛒 Courses</a>
    </div>
    <span class="nav-spacer"></span>
    <button class="nav-flash" id="btnFlash">⚡ Maintenant</button>
    <button class="nav-theme" id="btnTheme" title="Changer le thème">🌙</button>
    <button class="nav-theme" id="btnLogout" title="Déconnexion">🚪</button>
  </nav>

  <div class="modal-overlay hidden" id="modalFlash">
    <div class="modal">
      <button class="modal-close" id="modalClose">✕</button>
      <div id="modalContent"></div>
    </div>
  </div>

  <main class="main planning-main">
    <div class="section-header planning-section-header">
      <div class="planning-header-top">
        <h1 class="page-title" style="margin:0;">📅 Planning</h1>
        <button class="btn btn-primary btn-sm" id="btnGenererSemaine">✨ Générer par IA</button>
      </div>
      <div class="planning-header-nav">
        <button class="btn btn-secondary btn-sm" id="btnPrevWeek">←</button>
        <span id="labelSemaine" class="text-sm text-muted planning-week-label"></span>
        <button class="btn btn-secondary btn-sm" id="btnNextWeek">→</button>
      </div>
    </div>
<div class="planning-grid-wrapper">
      <div class="planning-grid" id="planningGrid"></div>
    </div>

    <div class="modal-overlay hidden" id="modalRecetteSelect">
      <div class="modal">
        <button class="modal-close" id="closeRecetteSelect">✕</button>
        <p class="modal-title">Choisir une recette</p>
        <div id="recetteSelectList" style="max-height:360px;overflow-y:auto;"></div>
      </div>
    </div>

    <div class="modal-overlay hidden" id="modalGenSemaine">
      <div class="modal gen-modal">
        <button class="modal-close" id="closeGenSemaine">✕</button>
        <p class="modal-title">✨ Générer <span id="genCreneauxCount">…</span> repas</p>

        <div id="meteoDisplay" class="gen-section"></div>

        <div class="gen-section">
          <div class="gen-section-label">📅 Créneaux à générer</div>
          <div id="genSlotChips" class="gen-chips-wrap"></div>
        </div>

        <div class="gen-section">
          <div class="gen-section-label">💬 Instructions libres</div>
          <textarea id="consignesLibres" class="gen-chat-input" rows="3"
            placeholder="Dis à l'IA ce que tu veux… ex : un couscous cette semaine, de la cuisine marocaine, éviter les oignons"></textarea>
        </div>

        <div class="gen-section">
          <div class="gen-section-label">👥 Pour qui ?</div>
          <div class="flex gap-sm" style="flex-wrap:wrap;">
            <button class="chip active" data-pour="deux">👫 Nous deux</button>
            <button class="chip"        data-pour="dylan">🧑 Dylan seulement</button>
          </div>
        </div>

        <div class="gen-section">
          <div class="gen-section-label">📅 Périmètre</div>
          <div class="gen-chips-wrap">
            <button class="chip active" data-perimetre="1">1 semaine</button>
            <button class="chip" data-perimetre="2">2 semaines <span style="font-size:0.72rem;opacity:0.75;">· variété garantie</span></button>
          </div>
        </div>

        <div class="gen-section">
          <div class="gen-section-label">⚙️ Options</div>
          <div class="gen-chips-wrap">
            <button class="chip" data-opt="rapide">⚡ Rapide (&lt; 30 min)</button>
            <button class="chip" data-opt="budget">💰 Budget serré</button>
            <button class="chip" data-opt="vegetarien">🌿 Tout végétarien</button>
            <button class="chip" data-opt="sansViande">🥦 Sans viande</button>
            <button class="chip" data-opt="sansPoisson">🐟 Sans poisson</button>
          </div>
        </div>

        <button class="btn btn-primary btn-full" id="btnLancerGen">✨ Générer les repas</button>
        <div id="genProgressWrap" class="hidden" style="margin-top:0.75rem;">
          <div class="gen-progress-bar"><div id="genProgressFill" class="gen-progress-fill"></div></div>
          <p class="text-xs text-muted" id="genStatus" style="margin-top:0.4rem;text-align:center;"></p>
        </div>
      </div>
    </div>
  </main>

  <script src="config.js"></script>
  <script type="module" src="js/app.js"></script>
  <script type="module" src="js/planning-ui.js"></script>
</body>
</html>
