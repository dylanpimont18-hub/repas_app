<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#3d2b1f">
  <link rel="manifest" href="manifest.json">
  <title>Repas — Planning</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <nav class="nav">
    <a href="index.html" class="nav-logo">🍽️ Repas</a>
    <button class="nav-burger" id="navBurger" aria-label="Menu">☰</button>
    <div class="nav-links" id="navLinks">
      <a href="planning.html" class="active">📅 Planning</a>
      <a href="recettes.html">📖 Recettes</a>
      <a href="preferences.html">❤️ Préférences</a>
      <a href="courses.html">🛒 Courses</a>
    </div>
    <span class="nav-spacer"></span>
    <button class="nav-flash" id="btnFlash">⚡ Maintenant</button>
    <button class="nav-theme" id="btnTheme" title="Changer le thème">🌙</button>
    <button class="nav-theme" id="btnLogout" title="Déconnexion">🚪</button>
  </nav>

  <div class="modal-overlay hidden" id="modalFlash">
    <div class="modal">
      <button class="modal-close" id="modalClose">✕</button>
      <div id="modalContent"></div>
    </div>
  </div>

  <main class="main planning-main">
    <div class="section-header">
      <h1 class="page-title">📅 Planning</h1>
      <div class="flex gap-sm">
        <button class="btn btn-secondary btn-sm" id="btnPrevWeek">← Semaine préc.</button>
        <span id="labelSemaine" class="text-sm text-muted" style="align-self:center;"></span>
        <button class="btn btn-secondary btn-sm" id="btnNextWeek">Semaine suiv. →</button>
        <button class="btn btn-primary btn-sm"   id="btnGenererSemaine">✨ Générer par IA</button>
      </div>
    </div>
    <div id="modeSelectionToolbar" class="hidden" style="margin-bottom:1rem;">
      <div class="flex gap-sm" style="flex-wrap:wrap;align-items:center;">
        <button class="btn btn-secondary btn-sm" id="selTousMidis">☀️ Tous les midis</button>
        <button class="btn btn-secondary btn-sm" id="selTousSoirs">🌙 Tous les soirs</button>
        <button class="btn btn-secondary btn-sm" id="selTousRepas">✓ Tous les repas</button>
        <button class="btn btn-ghost btn-sm"     id="selAucun">✗ Aucun</button>
        <span class="text-sm text-muted" id="selCount" style="margin-left:auto;"></span>
        <button class="btn btn-ghost btn-sm"     id="btnAnnulerSelection">Annuler</button>
        <button class="btn btn-primary btn-sm"   id="btnConfirmerSelection">✨ Générer <span id="selCountBtn">0</span> repas</button>
      </div>
    </div>
    <div class="planning-grid-wrapper">
      <div class="planning-grid" id="planningGrid"></div>
    </div>

    <div class="modal-overlay hidden" id="modalRecetteSelect">
      <div class="modal">
        <button class="modal-close" id="closeRecetteSelect">✕</button>
        <p class="modal-title">Choisir une recette</p>
        <div id="recetteSelectList" style="max-height:360px;overflow-y:auto;"></div>
      </div>
    </div>

    <div class="modal-overlay hidden" id="modalGenSemaine">
      <div class="modal gen-modal">
        <button class="modal-close" id="closeGenSemaine">✕</button>
        <p class="modal-title">✨ Générer <span id="genCreneauxCount">…</span> repas</p>

        <div id="meteoDisplay" class="gen-section"></div>

        <div class="gen-section">
          <div class="gen-section-label">👥 Pour qui ?</div>
          <div class="flex gap-sm" style="flex-wrap:wrap;">
            <button class="chip active" data-pour="deux">👫 Nous deux</button>
            <button class="chip"        data-pour="dylan">🧑 Dylan seulement</button>
          </div>
        </div>

        <div class="gen-section">
          <div class="gen-section-label">⚙️ Options</div>
          <div class="gen-chips-wrap">
            <button class="chip" data-opt="rapide">⚡ Rapide (&lt; 30 min)</button>
            <button class="chip" data-opt="budget">💰 Budget serré</button>
            <button class="chip" data-opt="vegetarien">🌿 Tout végétarien</button>
          </div>
        </div>

        <div class="gen-section">
          <div class="gen-section-label">🥩 Équilibre viande / poisson</div>
          <div class="gen-counter-row">
            <span class="text-sm">🥦 Sans viande <span class="text-xs text-muted">(poisson ok)</span></span>
            <div class="counter-ctrl">
              <button class="counter-btn" id="btnSansViandeM">−</button>
              <span class="counter-val" id="sansViandeVal">0</span>
              <button class="counter-btn" id="btnSansViandePl">+</button>
            </div>
          </div>
          <div class="gen-counter-row">
            <span class="text-sm">🐟 Sans poisson <span class="text-xs text-muted">(viande ok)</span></span>
            <div class="counter-ctrl">
              <button class="counter-btn" id="btnSansPoissonM">−</button>
              <span class="counter-val" id="sansPoissonVal">0</span>
              <button class="counter-btn" id="btnSansPoissonPl">+</button>
            </div>
          </div>
        </div>

        <div class="gen-section">
          <div class="gen-section-label">🌍 Style de cuisine</div>
          <div class="gen-chips-wrap">
            <button class="chip" data-cuisine="Marocain">🇲🇦 Marocain</button>
            <button class="chip" data-cuisine="Français">🇫🇷 Français</button>
            <button class="chip" data-cuisine="Asiatique">🥢 Asiatique</button>
            <button class="chip" data-cuisine="Italien">🇮🇹 Italien</button>
            <button class="chip" data-cuisine="Méditerranéen">🫒 Méditerranéen</button>
            <button class="chip" data-cuisine="Mexicain">🌮 Mexicain</button>
            <button class="chip" data-cuisine="Indien">🍛 Indien</button>
          </div>
        </div>

        <div class="gen-section">
          <div class="gen-section-label">💬 Instructions libres à l'IA</div>
          <div class="gen-examples">
            <button class="gen-example-chip" data-example="un ramen végétarien">🍜 Ramen</button>
            <button class="gen-example-chip" data-example="éviter le poulet">🚫 Sans poulet</button>
            <button class="gen-example-chip" data-example="des plats légers et frais">🥗 Léger</button>
            <button class="gen-example-chip" data-example="utiliser des lentilles">🫘 Lentilles</button>
            <button class="gen-example-chip" data-example="plats réconfortants">🍲 Réconfortant</button>
            <button class="gen-example-chip" data-example="un couscous">🫕 Couscous</button>
            <button class="gen-example-chip" data-example="des pâtes">🍝 Pâtes</button>
          </div>
          <textarea id="consignesLibres" class="gen-chat-input" rows="3"
            placeholder="Dis à l'IA ce que tu veux… ex : je veux un couscous cette semaine, éviter les oignons, des plats rapides à moins de 20 min"></textarea>
        </div>

        <button class="btn btn-primary btn-full" id="btnLancerGen">✨ Générer les repas</button>
        <p class="text-sm text-muted gen-status-txt" id="genStatus"></p>
      </div>
    </div>
  </main>

  <script src="config.js"></script>
  <script type="module" src="js/app.js"></script>
  <script type="module" src="js/planning-ui.js"></script>
</body>
</html>
