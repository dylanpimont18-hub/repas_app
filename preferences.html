<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#3d2b1f">
  <meta name="apple-mobile-web-app-title" content="Repas">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <link rel="manifest" href="manifest.json">
  <title>Repas — Préférences</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <nav class="nav">
    <a href="index.html" class="nav-logo">🍽️ Repas</a>
    <button class="nav-burger" id="navBurger" aria-label="Menu">☰</button>
    <div class="nav-links" id="navLinks">
      <a href="planning.html">📅 Planning</a>
      <a href="recettes.html">📖 Recettes</a>
      <a href="preferences.html" class="active">❤️ Préférences</a>
      <a href="courses.html">🛒 Courses</a>
    </div>
    <span class="nav-spacer"></span>
    <button class="nav-flash" id="btnFlash">⚡ Maintenant</button>
    <button class="nav-theme" id="btnTheme" title="Changer le thème">🌙</button>
    <button class="nav-theme" id="btnLogout" title="Déconnexion">🚪</button>
  </nav>

  <div class="modal-overlay hidden" id="modalFlash">
    <div class="modal">
      <button class="modal-close" id="modalClose">✕</button>
      <div id="modalContent"></div>
    </div>
  </div>

  <!-- Modal ajout ingrédient -->
  <div class="modal-overlay hidden" id="modalAddIng">
    <div class="modal">
      <button class="modal-close" id="modalAddIngClose">✕</button>
      <p class="modal-title">➕ Ajouter un ingrédient</p>
      <form id="addIngForm" style="display:flex;flex-direction:column;gap:1rem;">
        <div class="form-group">
          <label class="form-label">Nom *</label>
          <input id="addIngNom" type="text" class="form-input" placeholder="Ex: Pousses de soja" required maxlength="60">
        </div>
        <div class="form-group">
          <label class="form-label">Catégorie *</label>
          <select id="addIngCat" class="form-input"></select>
        </div>
        <div class="form-group">
          <label class="form-label">Emoji (optionnel)</label>
          <input id="addIngEmoji" type="text" class="form-input" placeholder="Ex: 🌱" maxlength="4" style="max-width:100px;">
        </div>
        <div class="flex gap-sm" style="justify-content:flex-end;">
          <button type="button" class="btn btn-ghost" id="modalAddIngClose2">Annuler</button>
          <button type="submit" class="btn btn-primary">Ajouter</button>
        </div>
      </form>
    </div>
  </div>

  <main class="main">
    <h1 class="page-title">❤️ Préférences</h1>
    <p class="page-subtitle">Notez vos ingrédients pour que l'IA génère des recettes adaptées.</p>

    <div id="preferences-header-row" class="flex" style="justify-content:space-between;align-items:center;margin-bottom:1.5rem;flex-wrap:wrap;gap:1rem;">
      <div class="flex gap-sm" style="flex-wrap:wrap;align-items:center;">
        <button class="chip active" data-profil="dylan">Dylan</button>
        <button class="chip"        data-profil="femme">Ma femme</button>
        <button class="btn btn-secondary btn-sm" id="btnAddIng" style="margin-left:0.5rem;">➕ Ingrédient</button>
      </div>
      <div class="view-toggle">
        <button class="active" id="btnVueCartes">🃏 Cartes</button>
        <button id="btnVueTableau">📋 Tableau</button>
      </div>
    </div>

    <!-- Vue Cartes -->
    <div id="vueCartes">
      <div class="flex gap-sm" style="flex-wrap:wrap;margin-bottom:2rem;" id="catChips"></div>
      <div style="margin-bottom:2rem;">
        <p class="text-sm text-muted" id="progressLabel"></p>
        <div class="progress-bar" style="margin-top:0.4rem;">
          <div class="progress-fill" id="progressFill" style="width:0%"></div>
        </div>
      </div>
      <div class="flex-center" style="flex-direction:column;gap:1.5rem;min-height:300px;">
        <div class="ingredient-card" id="ingredientCard">
          <div class="emoji" id="cardEmoji">🌿</div>
          <div class="nom"   id="cardNom">Chargement…</div>
          <div class="cat"   id="cardCat"></div>
        </div>
        <div class="pref-buttons" id="prefButtons">
          <button class="pref-btn pref-btn-naime"  data-niveau="j_aime_pas">😞 Non</button>
          <button class="pref-btn pref-btn-neutre" data-niveau="neutre">😐 Neutre</button>
          <button class="pref-btn pref-btn-aime"   data-niveau="j_aime">😊 J'aime</button>
          <button class="pref-btn pref-btn-adore"  data-niveau="j_adore">❤️ J'adore</button>
        </div>
        <p class="text-muted text-sm" id="catFinished" style="display:none;">✅ Catégorie complète !</p>
      </div>
    </div>

    <!-- Vue Tableau -->
    <div id="vueTableau" style="display:none;overflow-x:auto;">
      <table class="pref-table" id="prefTable"></table>
    </div>
  </main>

  <script src="config.js"></script>
  <script type="module" src="js/app.js"></script>
  <script type="module" src="js/preferences-ui.js"></script>
</body>
</html>
