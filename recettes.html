<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#3d2b1f">
  <meta name="apple-mobile-web-app-title" content="Repas">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <link rel="manifest" href="manifest.json">
  <title>Repas — Recettes</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <a href="planning.html" class="back-banner hidden" id="backBanner">← Retour au planning</a>
  <nav class="nav">
    <a href="index.html" class="nav-logo">🍽️ Repas</a>
    <button class="nav-burger" id="navBurger" aria-label="Menu">☰</button>
    <div class="nav-links" id="navLinks">
      <a href="planning.html">📅 Planning</a>
      <a href="recettes.html" class="active">📖 Recettes</a>
      <a href="preferences.html">❤️ Préférences</a>
      <a href="courses.html">🛒 Courses</a>
    </div>
    <span class="nav-spacer"></span>
    <button class="nav-flash" id="btnFlash">⚡ Maintenant</button>
    <button class="nav-theme" id="btnTheme" title="Changer le thème">🌙</button>
    <button class="nav-theme" id="btnLogout" title="Déconnexion">🚪</button>
  </nav>

  <div class="modal-overlay hidden" id="modalFlash">
    <div class="modal">
      <button class="modal-close" id="modalClose">✕</button>
      <div id="modalContent"></div>
    </div>
  </div>

  <main class="main">
    <div class="section-header">
      <h1 class="page-title">📖 Recettes</h1>
      <div class="flex gap-sm">
        <button class="chip" id="filtreVeg">🌿 Végé</button>
        <button class="chip" id="filtreRapide">⚡ Rapide</button>
      </div>
    </div>
    <div style="margin-bottom:1rem;position:relative;">
      <input type="search" id="rechercheRecette" class="form-input"
        placeholder="🔍 Rechercher une recette…"
        style="padding-left:0.9rem;" autocomplete="off">
    </div>
    <div id="recettesList" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem;"></div>
    <div class="modal-overlay hidden" id="modalDetail">
      <div class="modal" style="max-width:600px;max-height:90vh;overflow-y:auto;">
        <button class="modal-close" id="closeDetail">✕</button>
        <div id="detailContent"></div>
      </div>
    </div>
    <div class="modal-overlay hidden" id="modalEditRecette">
      <div class="modal" style="max-width:600px;max-height:90vh;overflow-y:auto;">
        <button class="modal-close" id="closeEditRecette">✕</button>
        <p class="modal-title" id="editRecetteTitle">✏️ Modifier la recette</p>
        <form id="formEditRecette" autocomplete="off">
          <!-- nom -->
          <div class="form-group">
            <label class="form-label">Nom</label>
            <input class="form-input" id="editNom" type="text" required>
          </div>
          <!-- row: portions, prep, cuisson, vegetarien -->
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;margin-bottom:1rem;">
            <div class="form-group" style="margin:0">
              <label class="form-label">Portions</label>
              <input class="form-input" id="editPortions" type="number" min="1" max="20">
            </div>
            <div class="form-group" style="margin:0">
              <label class="form-label">Prép (min)</label>
              <input class="form-input" id="editPrep" type="number" min="0">
            </div>
            <div class="form-group" style="margin:0">
              <label class="form-label">Cuisson (min)</label>
              <input class="form-input" id="editCuisson" type="number" min="0">
            </div>
            <div class="form-group" style="margin:0;display:flex;flex-direction:column;justify-content:center;">
              <label style="display:flex;align-items:center;gap:0.5rem;font-size:0.9rem;cursor:pointer;padding-top:1.4rem;">
                <input type="checkbox" id="editVeg" style="width:18px;height:18px;"> 🌿 Végétarien
              </label>
            </div>
          </div>
          <!-- nutrition -->
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;margin-bottom:1rem;">
            <div class="form-group" style="margin:0"><label class="form-label">Kcal</label><input class="form-input" id="editKcal" type="number" min="0"></div>
            <div class="form-group" style="margin:0"><label class="form-label">Protéines (g)</label><input class="form-input" id="editProt" type="number" min="0"></div>
            <div class="form-group" style="margin:0"><label class="form-label">Glucides (g)</label><input class="form-input" id="editGluc" type="number" min="0"></div>
            <div class="form-group" style="margin:0"><label class="form-label">Lipides (g)</label><input class="form-input" id="editLip" type="number" min="0"></div>
          </div>
          <!-- ingredients list -->
          <div class="form-group">
            <label class="form-label">Ingrédients</label>
            <div id="editIngredientsList"></div>
            <button type="button" class="btn btn-ghost btn-sm" id="btnAddIngredient" style="margin-top:0.4rem;">+ Ajouter un ingrédient</button>
          </div>
          <!-- etapes list -->
          <div class="form-group">
            <label class="form-label">Étapes</label>
            <div id="editEtapesList"></div>
            <button type="button" class="btn btn-ghost btn-sm" id="btnAddEtape" style="margin-top:0.4rem;">+ Ajouter une étape</button>
          </div>
          <!-- actions -->
          <div style="display:flex;justify-content:flex-end;gap:0.75rem;margin-top:1rem;padding-top:1rem;border-top:1px solid var(--color-border);">
            <button type="button" class="btn btn-secondary btn-sm" id="btnAnnulerEdit">Annuler</button>
            <button type="submit" class="btn btn-primary btn-sm" id="btnSauverEdit">Enregistrer</button>
          </div>
        </form>
      </div>
    </div>
  </main>

  <script src="config.js"></script>
  <script type="module" src="js/app.js"></script>
  <script type="module" src="js/recettes-ui.js"></script>
</body>
</html>
